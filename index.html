<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Repertuar </title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial;
  margin:0;
  padding:20px;
  background:#f2f2f2;
}

.container{
  max-width:1100px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
  text-align:center;
  margin-bottom:40px;
  background:#0f9d3a;
  color:#fff;
  padding:15px;
  border-radius:10px;
}

.film{
  display:flex;
  gap:25px;
  padding:25px 0;
  border-bottom:1px solid #ddd;
  position:relative;
}

.film::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-1px;
  height:3px;
  background:#e53935;
}

.poster{
  width:180px;
  flex-shrink:0;
}

.poster img{
  width:100%;
  border-radius:12px;
  box-shadow:0 6px 16px rgba(0,0,0,.2);
}

.details{
  flex:1;
}

.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}

.date{
  font-weight:700;
  color:#0f9d3a;
  margin-bottom:6px;
}

.meta p{
  margin:4px 0;
  font-size:14px;
}

.badge{
  display:inline-block;
  background:#ff9800;
  color:#fff;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  margin-left:10px;
}

.badge.dkf{
  background:#1976d2;
}

.badge.ticket{
  background:#555;
}

@media(max-width:800px){
  .film{flex-direction:column}
  .poster{width:100%}
}
</style>
</head>

<body>
<div class="container">
<h1>Repertuar</h1>
<div id="repertuar"></div>
</div>

<script>
fetch("data/2026-03.json")
  .then(res => res.json())
  .then(data => {

    document.querySelector("h1").innerText =
      "Repertuar Kino Za Rogiem – " + data.month;

    const container = document.getElementById("repertuar");

    data.movies.forEach(movie => {

      const film = document.createElement("div");
      film.className = "film";

      film.innerHTML = `
        <div class="poster">
          <img src="posters/${movie.poster}" alt="${movie.title}">
        </div>

        <div class="details">
          <div class="title">
            ${movie.title}
            ${movie.age ? `<span class="badge">Wiek: ${movie.age}</span>` : ""}
            ${movie.dkf ? `<span class="badge dkf">DKF</span>` : ""}
            ${movie.ticket ? `<span class="badge ticket">Bilet: ${movie.ticket}</span>` : ""}
          </div>

          <div class="date">${movie.date} godz. ${movie.time}</div>

          <div class="meta">
            ${movie.year ? `<p><strong>Rok:</strong> ${movie.year}</p>` : ""}
            ${movie.genre ? `<p><strong>Gatunek:</strong> ${movie.genre}</p>` : ""}
            ${movie.country ? `<p><strong>Produkcja:</strong> ${movie.country}</p>` : ""}
            ${movie.director ? `<p><strong>Reżyseria:</strong> ${movie.director}</p>` : ""}
            ${movie.cast ? `<p><strong>Obsada:</strong> ${movie.cast}</p>` : ""}
            ${movie.distributor ? `<p><strong>Dystrybutor:</strong> ${movie.distributor}</p>` : ""}
            ${movie.duration ? `<p><strong>Czas trwania:</strong> ${movie.duration} min</p>` : ""}
          </div>
        </div>
      `;

      container.appendChild(film);
    });

  })
  .catch(err => {
    document.getElementById("repertuar").innerHTML =
      "<p>Błąd wczytywania repertuaru.</p>";
    console.error(err);
  });
</script>

</body>
</html>
