<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Repertuar – Marzec 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
background:#f3f3f3;
font-family:Arial;
}

.moksial{
max-width:1100px;
margin:30px auto;
padding:0 12px;
}

.bar{
height:8px;
border-radius:8px;
margin-bottom:12px;
background:linear-gradient(90deg,#E73139 0%,#E4DF00 50%,#079B39 100%);
}

h2{
margin:6px 0 18px;
}

h2 span{
background:#079B39;
color:#fff;
padding:8px 16px;
border-radius:14px;
font-weight:700;
font-size:22px;
}

.wrap{
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 12px 35px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
}

thead th{
background:#079B39;
color:#fff;
padding:16px;
text-align:center;
font-size:16px;
}

thead th:first-child{
border-top-left-radius:18px;
}

thead th:last-child{
border-top-right-radius:18px;
}

td{
vertical-align:top;
padding:20px;
border-top:1px solid #eee;
}

td:first-child{
width:28%;
border-right:1px solid #eee;
text-align:center;
background:#fafafa;
}

.date{
display:inline-block;
padding:6px 14px;
border:1px solid #079B39;
border-radius:12px;
color:#079B39;
font-weight:600;
margin-bottom:4px;
}

.poster{
width:170px;
margin:12px auto 0;
border-radius:16px;
overflow:hidden;
}

.poster img{
width:100%;
display:block;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.18);
}

.head{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:10px;
}

.head h3{
margin:0;
font-size:22px;
font-weight:700;
}

.badges{
display:flex;
gap:6px;
flex-wrap:wrap;
}

.badge{
background:#FF9800;
color:#fff;
padding:4px 10px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.badge.dkf{
background:#1E88E5;
}

.badge.ticket{
background:#455A64;
}

.line{
height:3px;
background:#E73139;
margin:12px 0 16px;
border-radius:3px;
}

.line.dkf{
background:#1E88E5;
}

strong{
color:#079B39;
}

p{
margin:4px 0;
font-size:14px;
}

tbody tr:last-child td:first-child{
border-bottom-left-radius:18px;
}

tbody tr:last-child td:last-child{
border-bottom-right-radius:18px;
}

@media(max-width:900px){
table,thead,tbody,tr,td,th{
display:block;
width:100%;
}
thead{display:none;}
td:first-child{
border-right:0;
}
}
</style>
</head>

<body>

<div class="moksial">

<div class="bar"></div>
<h2><span id="title">Repertuar – Marzec 2026</span></h2>

<div class="wrap">
<table>
<thead>
<tr>
<th>DATA</th>
<th>FILM</th>
</tr>
</thead>

<tbody id="repertuar"></tbody>

</table>
</div>
</div>

<script>
fetch("data/2026-03.json")
.then(res => res.json())
.then(data => {

document.getElementById("title").innerText =
"Repertuar – Kino Za Rogiem (" + data.month + ")";

const tbody = document.getElementById("repertuar");

data.movies.forEach(movie => {

const tr = document.createElement("tr");

tr.innerHTML = `
<td>
<div class="date">${movie.date}</div><br>
${movie.time}
<div class="poster">
<img src="posters/${movie.poster}" alt="${movie.title}">
</div>
</td>

<td>
<div class="head">
<h3>${movie.title}</h3>
<div class="badges">
${movie.dkf ? `<span class="badge dkf">DKF</span>
<span class="badge ticket">Bilet: ${movie.ticket}</span>` : ``}
<span class="badge">Wiek: ${movie.age}</span>
</div>
</div>

<div class="line ${movie.dkf ? "dkf" : ""}"></div>

<p><strong>Rok produkcji:</strong> ${movie.year}</p>
<p><strong>Rodzaj:</strong> ${movie.type}</p>
<p><strong>Gatunek:</strong> ${movie.genre}</p>
<p><strong>Produkcja:</strong> ${movie.country}</p>
<p><strong>Reżyseria:</strong> ${movie.director}</p>
${movie.cast ? `<p><strong>Obsada:</strong> ${movie.cast}</p>` : ``}
<p><strong>Dystrybutor:</strong> ${movie.distributor}</p>
<p><strong>Czas trwania:</strong> ${movie.duration} min</p>
</td>
`;

tbody.appendChild(tr);

});

});
</script>

</body>
</html>
