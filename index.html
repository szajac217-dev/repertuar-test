<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Repertuar – Marzec 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;margin:0;padding:20px;background:#f5f5f5}
.container{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{text-align:center;margin-bottom:30px}

.film{
display:flex;
gap:20px;
border-bottom:1px solid #eee;
padding:20px 0;
}

.poster{
width:180px;
flex-shrink:0;
}

.poster img{
width:100%;
border-radius:12px;
box-shadow:0 6px 16px rgba(0,0,0,.15);
}

.details{
flex:1;
}

.date{
font-weight:700;
color:#079B39;
margin-bottom:8px;
}

.title{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.meta{
font-size:14px;
color:#555;
line-height:1.5;
}

@media(max-width:800px){
.film{flex-direction:column}
.poster{width:100%}
}
</style>
</head>

<body>
<div class="container">
<h1>Repertuar – Marzec 2026</h1>
<div id="repertuar"></div>
</div>

<script>
fetch('data/2026-03.json')
.then(res=>res.json())
.then(data=>{

const container=document.getElementById('repertuar');

data.forEach(film=>{

container.innerHTML+=`
<div class="film">
  <div class="poster">
    <img src="posters/${film.poster}" alt="${film.title}">
  </div>
  <div class="details">
    <div class="date">${film.date} | godz. ${film.time}</div>
    <div class="title">${film.title}</div>
    <div class="meta">
      Rok: ${film.year}<br>
      Gatunek: ${film.genre}<br>
      Produkcja: ${film.production}<br>
      Reżyseria: ${film.director}<br>
      Czas: ${film.duration} min<br>
      Wiek: ${film.age}
    </div>
  </div>
</div>
`;

});

});
</script>

</body>
</html>
